services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpulse
    volumes:
      - .:/workspace:cached
      - finpulse-db:/data
      - node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      - DATABASE_URL=file:/data/finpulse.db
      - AUTH_SECRET=finpulse-dev-secret-change-in-production
      - AUTH_URL=http://localhost:3000
      - NODE_ENV=development
    working_dir: /workspace
    command: >
      bash -c "npm install &&
               npx prisma generate &&
               npx prisma db push &&
               npm run dev -- -H 0.0.0.0"

volumes:
  finpulse-db:
  node_modules:
