services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpulse-frontend
    volumes:
      - .:/workspace:cached
      - node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - AUTH_SECRET=finpulse-dev-secret-change-in-production
      - AUTH_URL=http://localhost:3000
      - NODE_ENV=development
    working_dir: /workspace
    command: >
      bash -c "npm install &&
               npm run dev -- -H 0.0.0.0"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finpulse-backend
    volumes:
      - ./backend:/app:cached
      - finpulse-db:/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/finpulse.db
      - AUTH_SECRET=finpulse-dev-secret-change-in-production

volumes:
  finpulse-db:
  node_modules:
