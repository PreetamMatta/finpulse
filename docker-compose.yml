services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpulse-frontend
    volumes:
      - .:/workspace:cached
      - node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - INTERNAL_API_KEY=finpulse-dev-internal-api-key-change-in-production
      - AUTH_SECRET=finpulse-dev-secret-change-in-production
      - AUTH_URL=http://localhost:3000
      - NODE_ENV=development
    working_dir: /workspace
    command: >
      bash -c "npm install &&
               npm run dev -- -H 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finpulse-backend
    volumes:
      - ./backend:/app:cached
      - finpulse-db:/data
    environment:
      - DATABASE_URL=sqlite:////data/finpulse.db
      - INTERNAL_API_KEY=finpulse-dev-internal-api-key-change-in-production
      - AUTH_SECRET=finpulse-dev-secret-change-in-production

volumes:
  finpulse-db:
  node_modules:
